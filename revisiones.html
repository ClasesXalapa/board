<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revisiones — Board</title>
<style>
:root{
  --bg:#15161a; --panel:#1c1e24; --panel-2:#23262e; --line:#2e313b;
  --text:#ece9e2; --text-dim:#9a9da6; --text-muted:#444753;
  --accent:#ff5c39; --accent-soft:rgba(255,92,57,.14);
  --pink:#ff7ea3; --radius:10px; --font:'Inter',-apple-system,sans-serif;
  --font-display:'Fraunces', Georgia, serif;
  --est-pendiente:#f0c850; --est-cambios:#f0904d; --est-aceptado:#5fb98c;
}
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; }

header.top{
  padding:28px 32px 20px; display:flex; align-items:baseline; justify-content:space-between;
  gap:16px; border-bottom:1px solid var(--line); flex-wrap:wrap;
}
.brand{ display:flex; align-items:baseline; gap:12px; }
.brand h1{ font-family:var(--font-display); font-size:26px; font-weight:600; letter-spacing:-.5px; }
.brand .tag{ color:var(--text-dim); font-size:13px; letter-spacing:.04em; text-transform:uppercase; }
.top-actions{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }

.btn{
  background:var(--panel-2); border:1px solid var(--line); color:var(--text);
  padding:9px 16px; border-radius:8px; font-size:13.5px; font-family:var(--font);
  cursor:pointer; transition:border-color .15s ease, transform .1s ease; text-decoration:none;
  display:inline-flex; align-items:center; gap:6px;
}
.btn:hover{ border-color:#444753; }
.btn:active{ transform:scale(.98); }
.btn.primary{ background:var(--accent); border-color:var(--accent); color:#1a1310; font-weight:600; }
.btn.primary:hover{ filter:brightness(1.07); }
.btn.ghost{ background:transparent; }
.btn.sm{ font-size:12px; padding:6px 11px; }

.status-pill{ font-size:12px; color:var(--text-dim); display:flex; align-items:center; gap:6px; }
.dot{ width:7px; height:7px; border-radius:50%; background:#666; display:inline-block; }
.dot.ok{ background:var(--est-aceptado); } .dot.warn{ background:#f0b94d; }

.filter-select, select, .field select{
  background:var(--panel-2); border:1px solid var(--line); color:var(--text);
  padding:8px 12px; border-radius:8px; font-size:13px; font-family:var(--font); cursor:pointer;
}
.filter-select{ max-width:180px; }
.filter-select.active{ border-color:var(--pink); color:var(--pink); }
.check-inline{ display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--text-dim); cursor:pointer; }

main{ padding:24px 32px 60px; overflow-x:auto; display:flex; justify-content:center; }
.board{ display:flex; gap:18px; align-items:flex-start; min-height:60vh; margin:0 auto; }
.column{
  background:var(--panel); border-radius:var(--radius); width:300px; min-width:300px; flex-shrink:0;
  border:1px solid var(--line); display:flex; flex-direction:column; max-height:calc(100vh - 180px);
}
.column-head{ padding:14px 14px 10px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; }
.column-title{ font-size:13px; font-weight:600; letter-spacing:.03em; text-transform:uppercase; display:flex; align-items:center; gap:8px; }
.col-count{ background:var(--panel-2); color:var(--text-dim); font-size:11.5px; padding:2px 7px; border-radius:20px; }
.column[data-col="preprod"] .column-title{ color:#9fc7ff; }
.column[data-col="edicion"] .column-title{ color:#f0b94d; }
.column[data-col="final"]   .column-title{ color:#c89bf0; }
.column[data-col="listo"]   .column-title{ color:#5fb98c; }

.column-body{ padding:4px 10px 10px; overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:8px; }
.column-body.drag-over{ background:rgba(255,126,163,.08); border-radius:8px; }
.add-card-btn{
  margin:4px 10px 12px; text-align:left; background:transparent; border:1px dashed var(--line);
  color:var(--text-dim); padding:9px 10px; border-radius:8px; cursor:pointer; font-size:13px;
}
.add-card-btn:hover{ border-color:var(--pink); color:var(--text); }
.empty-col{ color:var(--text-muted); font-size:12.5px; text-align:center; padding:18px 8px; }

.card{
  background:var(--panel-2); border:1px solid var(--line); border-radius:8px;
  padding:12px 13px; cursor:grab; position:relative;
}
.card:active{ cursor:grabbing; }
.card.dragging{ opacity:.4; }
.card.st-pendiente{ background:rgba(240,200,80,.08); border-color:rgba(240,200,80,.4); }
.card.st-cambios{ background:rgba(240,144,77,.10); border-color:rgba(240,144,77,.4); }
.card-placeholder{ border:2px dashed var(--pink); border-radius:8px; height:64px; background:rgba(255,126,163,.08); pointer-events:none; flex-shrink:0; }

.card-title{ font-size:14px; font-weight:500; margin:0 0 6px; line-height:1.3; }
.card-desc{
  font-size:12.5px; color:var(--text-dim); margin:0 0 9px; line-height:1.4;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.card-people{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
.people-tag{
  display:inline-flex; align-items:center; gap:5px; font-size:11.5px; color:var(--text-dim);
  background:var(--panel); border:1px solid var(--line); padding:3px 8px 3px 3px; border-radius:20px;
}
.people-tag.revisor{ color:var(--pink); border-color:rgba(255,126,163,.35); }
.avatar{
  width:17px; height:17px; border-radius:50%; background:var(--panel);
  border:1px solid var(--line); display:inline-flex; align-items:center; justify-content:center;
  font-size:9px; font-weight:700; color:var(--text-dim); flex-shrink:0;
}
.people-tag.revisor .avatar{ color:var(--pink); border-color:rgba(255,126,163,.35); }

.card-footer{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
.estado-badge{ font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:20px; letter-spacing:.02em; white-space:nowrap; }
.estado-badge.pendiente{ color:var(--est-pendiente); background:rgba(240,200,80,.16); }
.estado-badge.cambios{ color:var(--est-cambios); background:rgba(240,144,77,.16); }
.estado-badge.aceptado{ color:var(--est-aceptado); background:rgba(95,185,140,.14); }
.doc-open-btn{
  font-size:11px; color:#9fc7ff; background:transparent; border:1px solid rgba(159,199,255,.35);
  padding:3px 9px; border-radius:20px; cursor:pointer; white-space:nowrap; text-decoration:none;
}
.doc-open-btn:hover{ background:rgba(159,199,255,.1); }

/* Overlay / modal */
.overlay{
  position:fixed; inset:0; background:rgba(10,10,12,.6); display:none;
  align-items:flex-start; justify-content:center; padding:5vh 20px; overflow-y:auto; z-index:50;
}
.overlay.open{ display:flex; }
.modal{ background:var(--panel); border:1px solid var(--line); border-radius:14px; width:100%; max-width:520px; padding:26px; }
.modal.wide{ max-width:620px; }
.modal h2{ font-size:17px; font-weight:600; margin-bottom:18px; }
.field{ margin-bottom:15px; }
.field label{ display:block; font-size:11px; color:var(--text-dim); letter-spacing:.04em; text-transform:uppercase; margin-bottom:6px; }
.field input, .field textarea, .field select{
  width:100%; background:var(--panel-2); border:1px solid var(--line); color:var(--text);
  padding:9px 12px; border-radius:8px; font-size:13.5px; font-family:var(--font); transition:border-color .15s;
}
.field input:focus, .field textarea:focus, .field select:focus{ outline:none; border-color:var(--pink); }
.field select:disabled, .field input:disabled{ opacity:.55; cursor:not-allowed; }
.field textarea{ resize:vertical; min-height:64px; line-height:1.5; }
.row2{ display:flex; gap:12px; }
.row2 .field{ flex:1; }
.modal-actions{ display:flex; align-items:center; gap:8px; margin-top:20px; }

/* Panel de admin: documentos por autor */
.admin-doc-row{
  display:flex; align-items:center; gap:8px; background:var(--panel-2); border:1px solid var(--line);
  border-radius:8px; padding:9px 11px; margin-bottom:7px;
}
.admin-doc-info{ flex:1; min-width:0; }
.admin-doc-autor{ font-size:10.5px; color:var(--pink); font-weight:600; text-transform:uppercase; letter-spacing:.03em; }
.admin-doc-nombre{ font-size:13px; margin:2px 0; }
.admin-doc-url{ font-size:11px; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:block; }
.admin-doc-remove{
  background:transparent; border:1px solid var(--line); color:var(--text-dim);
  width:30px; height:30px; border-radius:8px; cursor:pointer; flex-shrink:0; font-size:14px;
}
.admin-doc-remove:hover{ border-color:var(--accent); color:var(--accent); }
.no-docs-admin{ color:var(--text-muted); font-size:12.5px; text-align:center; padding:10px 0; }
.setup-box{
  max-width:420px; margin:12vh auto 0; background:var(--panel); border:1px solid var(--line);
  border-radius:14px; padding:30px; text-align:left;
}
.setup-box h2{ font-size:18px; margin-bottom:10px; }
.setup-box p{ font-size:13px; color:var(--text-dim); margin-bottom:16px; line-height:1.5; }
.setup-box input{
  width:100%; background:var(--panel-2); border:1px solid var(--line); color:var(--text);
  padding:10px 12px; border-radius:8px; font-size:13.5px; margin-bottom:14px;
}

.hidden{ display:none !important; }

.toast{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--panel-2); border:1px solid var(--line); color:var(--text);
  padding:11px 18px; border-radius:9px; font-size:13px; opacity:0; pointer-events:none;
  transition:all .25s ease; z-index:100;
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div id="setupScreen" class="setup-box hidden">
  <h2>Conectar Revisiones</h2>
  <p>Pega tu token de GitHub (scope <strong>gist</strong> únicamente). Es el mismo token que usas en el Board.</p>
  <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
  <button class="btn primary" id="connectBtn" style="width:100%;">Conectar</button>
</div>

<div id="appScreen" class="hidden">
  <header class="top">
    <div class="brand">
      <h1>Revisiones</h1>
      <span class="tag">Feedback de producción</span>
    </div>
    <div class="top-actions">
      <span class="status-pill"><span class="dot" id="syncDot"></span><span id="syncText">—</span></span>
      <select class="filter-select" id="filterAutor" title="Ver cards de">
        <option value="">Todos los autores</option>
      </select>
      <select class="filter-select" id="filterRevisor" title="Ver pendientes de">
        <option value="">Todos los revisores</option>
      </select>
      <label class="check-inline"><input type="checkbox" id="onlyPending"> Solo por atender</label>
      <button class="btn ghost" id="reportBtn">Generar reporte</button>
      <button class="btn ghost" id="adminDocsBtn">⚙ Documentos</button>
      <button class="btn ghost" id="refreshBtn">Actualizar</button>
      <a class="btn ghost" href="index.html">⬅ Board</a>
      <button class="btn ghost" id="logoutBtn">Cambiar token</button>
    </div>
  </header>

  <main>
    <div class="board" id="board"></div>
  </main>
</div>

<!-- Modal tarjeta -->
<div class="overlay" id="cardOverlay">
  <div class="modal">
    <h2 id="modalTitle">Nueva revisión</h2>
    <form id="cardForm">
      <div class="field">
        <label>Título</label>
        <input type="text" id="f_title" required placeholder="Ej. Canción: video del perro en la boda">
      </div>
      <div class="field">
        <label>Descripción</label>
        <textarea id="f_desc" placeholder="Contexto, qué se necesita revisar..."></textarea>
      </div>
      <div class="row2">
        <div class="field">
          <label>Autor (responsable)</label>
          <select id="f_autor" required>
            <option value="">— Selecciona —</option>
          </select>
        </div>
        <div class="field" id="revisorNormalWrap">
          <label>Revisor asignado</label>
          <select id="f_revisor">
            <option value="">— Sin asignar —</option>
          </select>
        </div>
      </div>
      <div class="row2 hidden" id="revisorFinalWrap">
        <div class="field">
          <label>Revisor previo</label>
          <select id="f_revisorPrevio">
            <option value="">— Sin asignar —</option>
          </select>
        </div>
        <div class="field">
          <label>Revisor final</label>
          <input type="text" id="f_revisorFinalDisplay" value="Josué" disabled>
        </div>
      </div>
      <div class="field">
        <label>Estado</label>
        <select id="f_estado">
          <option value="pendiente">🟡 Pendiente de revisión</option>
          <option value="cambios">🟠 Cambios solicitados</option>
          <option value="aceptado">🟢 Aceptado</option>
        </select>
      </div>

      <div class="field">
        <label>Documento (Google Doc)</label>
        <select id="f_doc">
          <option value="">— Selecciona un autor primero —</option>
        </select>
        <div id="docManualWrap" class="hidden" style="margin-top:8px;">
          <input type="url" id="f_docManualUrl" placeholder="Pega el link del Google Doc">
        </div>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn ghost" id="cardDeleteBtn" style="display:none; border-color:var(--accent); color:var(--accent);">Eliminar</button>
        <div style="flex:1;"></div>
        <button type="button" class="btn ghost" id="cardCancelBtn">Cancelar</button>
        <button type="submit" class="btn primary">Guardar</button>
      </div>
    </form>
  </div>
</div>

<!-- Password overlay -->
<div class="overlay" id="passOverlay">
  <div class="modal" style="max-width:340px;">
    <h2>Contraseña de administrador</h2>
    <div class="field"><input type="password" id="passInput" placeholder="Contraseña"></div>
    <div class="modal-actions">
      <div style="flex:1;"></div>
      <button type="button" class="btn ghost" id="passCancelBtn">Cancelar</button>
      <button type="button" class="btn primary" id="passConfirmBtn">Confirmar</button>
    </div>
  </div>
</div>

<!-- Reporte WhatsApp -->
<div class="overlay" id="reportOverlay">
  <div class="modal" style="max-width:380px;">
    <h2>Generar reporte</h2>
    <div class="field">
      <label>Incluir fases</label>
      <label class="check-inline" style="margin-bottom:8px;"><input type="checkbox" id="rep_preprod" checked> Pre-producción</label><br>
      <label class="check-inline" style="margin-bottom:8px;"><input type="checkbox" id="rep_edicion" checked> Edición</label><br>
      <label class="check-inline" style="margin-bottom:8px;"><input type="checkbox" id="rep_final" checked> Revisión final</label><br>
      <label class="check-inline" style="margin-bottom:8px;"><input type="checkbox" id="rep_listo" checked> Listo</label>
    </div>
    <div class="field">
      <label class="check-inline"><input type="checkbox" id="rep_onlyPending" checked> Solo cards por atender</label>
    </div>
    <div class="modal-actions">
      <button type="button" class="btn ghost" id="reportCancelBtn">Cancelar</button>
      <div style="flex:1;"></div>
      <button type="button" class="btn primary" id="reportGenerateBtn">Enviar a WhatsApp</button>
    </div>
  </div>
</div>

<!-- Admin: documentos por autor -->
<div class="overlay" id="adminOverlay">
  <div class="modal wide">
    <h2>Documentos de Google Doc por autor</h2>
    <div class="field">
      <label>Agregar documento</label>
      <div class="row2">
        <select id="admin_autor"><option value="">— Autor —</option></select>
        <input type="text" id="admin_nombre" placeholder="Nombre (ej. Videos explicativos 2026)">
      </div>
      <input type="url" id="admin_url" placeholder="Link del Google Doc" style="margin-top:8px;">
      <button type="button" class="btn primary sm" id="adminAddDocBtn" style="margin-top:8px; width:100%;">+ Agregar documento</button>
    </div>
    <div class="field">
      <label>Documentos registrados</label>
      <div id="adminDocsList"></div>
    </div>
    <div class="modal-actions">
      <div style="flex:1;"></div>
      <button type="button" class="btn ghost" id="adminCloseBtn">Cerrar</button>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════
   CONFIG
════════════════════════════ */
const ADMIN_PASS        = 'combijosue26';
const GIST_DESC         = 'metiche-board-data';
const STORAGE_TOKEN_KEY = 'metiche_gh_token';
const STORAGE_GIST_KEY  = 'metiche_gist_id';

const COLUMNS = [
  { id:'preprod', label:'Pre-producción' },
  { id:'edicion',  label:'Edición' },
  { id:'final',    label:'Revisión final' },
  { id:'listo',    label:'Listo' },
];

let token         = localStorage.getItem(STORAGE_TOKEN_KEY) || '';
let gistId        = localStorage.getItem(STORAGE_GIST_KEY)  || '';
let state         = { cards: [], docs: [] };
let responsables  = [];
let currentFilter = '';
let currentAutorFilter = '';
let onlyPending   = false;
let editingCardId = null;
let saveTimer     = null;

const $  = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const escapeHtml = str => { const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; };

function isGoogleLink(url){
  return /^https?:\/\/(docs|drive)\.google\.com\//i.test(url.trim());
}

/* ════════════════════════════
   TOAST / SYNC
════════════════════════════ */
function toast(msg){
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2400);
}

function setSync(s){
  const dot = $('#syncDot'), text = $('#syncText');
  dot.className = 'dot';
  if(s === 'ok'){ dot.classList.add('ok'); text.textContent = 'Sincronizado'; }
  else if(s === 'saving'){ dot.classList.add('warn'); text.textContent = 'Guardando...'; }
  else if(s === 'error'){ text.textContent = 'Error'; }
  else { text.textContent = 'Cargando...'; }
}

function initials(name){
  if(!name) return '?';
  return name.trim().split(/\s+/).slice(0,2).map(w => w[0].toUpperCase()).join('');
}

function personColor(name){
  if(!name) return { text:'#9a9da6', bg:'rgba(154,157,166,.14)', border:'rgba(154,157,166,.4)' };
  let hash = 0;
  for(let i = 0; i < name.length; i++){ hash = (hash * 31 + name.charCodeAt(i)) >>> 0; }
  const hue = hash % 360;
  return {
    text: `hsl(${hue}, 72%, 72%)`,
    bg: `hsla(${hue}, 72%, 55%, .16)`,
    border: `hsla(${hue}, 72%, 55%, .4)`
  };
}

/* ════════════════════════════
   GITHUB GIST API
════════════════════════════ */
async function ghFetch(url, opts = {}){
  const res = await fetch(url, {
    ...opts,
    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github+json', ...(opts.headers || {}) }
  });
  if(!res.ok){ const b = await res.text(); throw new Error(`GH ${res.status}: ${b}`); }
  return res.json();
}

async function findOrCreateGist(){
  if(gistId){
    try{ await ghFetch(`https://api.github.com/gists/${gistId}`); return gistId; }
    catch(e){ gistId = ''; localStorage.removeItem(STORAGE_GIST_KEY); }
  }
  const gists = await ghFetch('https://api.github.com/gists');
  const found = gists.find(g => g.description === GIST_DESC);
  if(found){
    gistId = found.id;
    localStorage.setItem(STORAGE_GIST_KEY, gistId);
    return gistId;
  }
  const created = await ghFetch('https://api.github.com/gists', {
    method: 'POST',
    body: JSON.stringify({
      description: GIST_DESC, public: false,
      files: {
        'board.json': { content: JSON.stringify({ tasks:[], resources:[], categories:[], responsables:[] }, null, 2) },
        'recursos.json': { content: JSON.stringify({ resources:[], categories:[] }, null, 2) },
        'revisiones.json': { content: JSON.stringify({ cards:[], docs:[] }, null, 2) }
      }
    })
  });
  gistId = created.id;
  localStorage.setItem(STORAGE_GIST_KEY, gistId);
  return gistId;
}

async function loadAll(){
  setSync('loading');
  await findOrCreateGist();
  const gist = await ghFetch(`https://api.github.com/gists/${gistId}`);

  // Responsables: fuente de verdad es board.json (solo lectura aquí)
  const boardFile = gist.files['board.json'];
  if(boardFile){
    try{
      const parsedBoard = JSON.parse(boardFile.content || '{}');
      responsables = parsedBoard.responsables || [];
    }catch(e){ responsables = []; }
  }

  // Cards de revisión
  const revFile = gist.files['revisiones.json'];
  if(revFile){
    try{
      const parsed = JSON.parse(revFile.content || '{"cards":[],"docs":[]}');
      state.cards = parsed.cards || [];
      state.docs = parsed.docs || [];
    }catch(e){ state.cards = []; state.docs = []; }
  } else {
    state.cards = [];
    state.docs = [];
  }
  state.cards.forEach(c => {
    if(!c.estado) c.estado = 'pendiente';
    // Migración desde el modelo anterior de links múltiples a un solo documento
    if(!c.docUrl && c.links && c.links.length > 0){
      c.docUrl = c.links[0].url;
      c.docNombre = '';
    }
    delete c.links;
  });

  setSync('ok');
  populateFilterSelect();
  render();
}

async function saveState(){
  setSync('saving');
  try{
    await ghFetch(`https://api.github.com/gists/${gistId}`, {
      method: 'PATCH',
      body: JSON.stringify({ files: { 'revisiones.json': { content: JSON.stringify(state, null, 2) } } })
    });
    setSync('ok');
  }catch(e){
    setSync('error');
    toast('No se pudo guardar. Revisa el token.');
    console.error(e);
  }
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 500);
}

/* ════════════════════════════
   SELECTS DE RESPONSABLES
════════════════════════════ */
function fillResponsableSelect(sel, emptyLabel, selected){
  sel.innerHTML = `<option value="">${emptyLabel}</option>`;
  responsables.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r; opt.textContent = r;
    if(r === selected) opt.selected = true;
    sel.appendChild(opt);
  });
}

function populateFilterSelect(){
  const sel = $('#filterRevisor');
  const prev = currentFilter;
  sel.innerHTML = '<option value="">Todos los revisores</option>';
  responsables.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r; opt.textContent = r;
    sel.appendChild(opt);
  });
  if(prev && !responsables.includes(prev)) currentFilter = '';
  sel.value = currentFilter;
  sel.classList.toggle('active', !!currentFilter);

  const selA = $('#filterAutor');
  const prevA = currentAutorFilter;
  selA.innerHTML = '<option value="">Todos los autores</option>';
  responsables.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r; opt.textContent = r;
    selA.appendChild(opt);
  });
  if(prevA && !responsables.includes(prevA)) currentAutorFilter = '';
  selA.value = currentAutorFilter;
  selA.classList.toggle('active', !!currentAutorFilter);
}

$('#filterAutor').addEventListener('change', e => {
  currentAutorFilter = e.target.value;
  $('#filterAutor').classList.toggle('active', !!currentAutorFilter);
  render();
});

$('#filterRevisor').addEventListener('change', e => {
  currentFilter = e.target.value;
  $('#filterRevisor').classList.toggle('active', !!currentFilter);
  render();
});
$('#onlyPending').addEventListener('change', e => {
  onlyPending = e.target.checked;
  render();
});

/* ════════════════════════════
   RENDER TABLERO
════════════════════════════ */
function needsAttention(card){
  return card.estado === 'pendiente' || card.estado === 'cambios';
}

function cardMatchesFilters(card){
  if(currentFilter && card.revisor !== currentFilter) return false;
  if(currentAutorFilter && card.autor !== currentAutorFilter) return false;
  if(onlyPending && !needsAttention(card)) return false;
  return true;
}

function render(){
  const board = $('#board');
  board.innerHTML = '';
  COLUMNS.forEach(col => {
    const cards = state.cards.filter(c => c.col === col.id && cardMatchesFilters(c));
    const colEl = document.createElement('div');
    colEl.className = 'column';
    colEl.dataset.col = col.id;
    colEl.innerHTML = `
      <div class="column-head">
        <div class="column-title">${col.label} <span class="col-count">${cards.length}</span></div>
      </div>
      <div class="column-body" data-col="${col.id}"></div>
      <button class="add-card-btn" data-col="${col.id}">+ Añadir revisión</button>
    `;
    const body = colEl.querySelector('.column-body');
    if(cards.length === 0){
      body.innerHTML = '<div class="empty-col">Sin revisiones</div>';
    } else {
      cards.forEach(c => body.appendChild(renderCard(c)));
    }
    board.appendChild(colEl);
  });

  $$('.card').forEach(card => {
    card.addEventListener('dragstart', onDragStart);
    card.addEventListener('dragend', onDragEnd);
    card.addEventListener('click', () => openCardModal(card.dataset.id));
  });
  $$('.doc-open-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      window.open(btn.dataset.url, '_blank');
    });
  });
  $$('.column-body').forEach(body => {
    body.addEventListener('dragover', onDragOver);
    body.addEventListener('dragleave', onDragLeave);
    body.addEventListener('drop', onDrop);
  });
  $$('.add-card-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if(btn.dataset.col === 'listo'){
        checkPassword().then(ok => { if(ok) openCardModal(null, btn.dataset.col); });
      } else {
        openCardModal(null, btn.dataset.col);
      }
    });
  });
}

const ESTADOS = {
  pendiente: { label:'🟡 Pendiente', cls:'pendiente' },
  cambios:   { label:'🟠 Cambios solicitados', cls:'cambios' },
  aceptado:  { label:'🟢 Aceptado', cls:'aceptado' },
};

function personTag(name, prefix){
  if(!name) return '';
  const c = personColor(name);
  return `<span class="people-tag${prefix ? ' revisor' : ''}" style="color:${c.text}; border-color:${c.border};"><span class="avatar" style="color:${c.text}; border-color:${c.border}; background:${c.bg};">${initials(name)}</span>${prefix || ''}${escapeHtml(name)}</span>`;
}

function renderCard(c){
  const div = document.createElement('div');
  div.className = 'card';
  if(c.estado === 'pendiente') div.classList.add('st-pendiente');
  else if(c.estado === 'cambios') div.classList.add('st-cambios');
  div.draggable = true;
  div.dataset.id = c.id;
  const est = ESTADOS[c.estado] || ESTADOS.pendiente;

  const peopleHtml = isFinalStage(c.col)
    ? personTag(c.autor) + personTag(c.revisorPrevio, 'Previo: ') + personTag(c.revisorFinal, 'Final: ')
    : personTag(c.autor) + personTag(c.revisor, '→ ');

  div.innerHTML = `
    <p class="card-title">${escapeHtml(c.title)}</p>
    ${c.desc ? `<p class="card-desc">${escapeHtml(c.desc)}</p>` : ''}
    <div class="card-people">${peopleHtml}</div>
    <div class="card-footer">
      <span class="estado-badge ${est.cls}">${est.label}</span>
      ${c.docUrl ? `<button type="button" class="doc-open-btn" data-url="${escapeHtml(c.docUrl)}">📄 Abrir Doc</button>` : '<span class="links-count">Sin documento</span>'}
    </div>
  `;
  return div;
}

/* ════════════════════════════
   DRAG & DROP
════════════════════════════ */
let draggedId = null;
let placeholder = null;

function onDragStart(e){
  draggedId = e.currentTarget.dataset.id;
  setTimeout(() => e.currentTarget.classList.add('dragging'), 0);
  e.dataTransfer.effectAllowed = 'move';
}
function onDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  if(placeholder && placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);
  placeholder = null;
  $$('.column-body').forEach(b => b.classList.remove('drag-over'));
}
function getPlaceholder(){
  if(!placeholder){
    placeholder = document.createElement('div');
    placeholder.className = 'card-placeholder';
  }
  return placeholder;
}
function getDragAfterElement(container, y){
  const els = [...container.querySelectorAll('.card:not(.dragging):not(.card-placeholder)')];
  return els.reduce((closest, el) => {
    const box = el.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if(offset < 0 && offset > closest.offset) return { offset, element: el };
    return closest;
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}
function onDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const body = e.currentTarget;
  body.classList.add('drag-over');
  const ph = getPlaceholder();
  const afterEl = getDragAfterElement(body, e.clientY);
  if(afterEl) body.insertBefore(ph, afterEl);
  else body.appendChild(ph);
}
function onDragLeave(e){
  if(!e.currentTarget.contains(e.relatedTarget)) e.currentTarget.classList.remove('drag-over');
}
function onDrop(e){
  e.preventDefault();
  $$('.column-body').forEach(b => b.classList.remove('drag-over'));
  const body = e.currentTarget;
  const newCol = body.dataset.col;

  const ph = getPlaceholder();
  const afterEl = getDragAfterElement(body, e.clientY);
  const insertBeforeId = (afterEl && afterEl.dataset.id) ? afterEl.dataset.id : null;

  if(ph && ph.parentNode) ph.parentNode.removeChild(ph);
  placeholder = null;

  const card = state.cards.find(c => c.id === draggedId);
  if(!card) return;

  if(newCol === 'listo' && card.col !== 'listo'){
    checkPassword().then(ok => {
      if(ok) performMove(card, newCol, insertBeforeId);
      else render(); // revertir visualmente, no se movió nada en el estado
    });
  } else {
    performMove(card, newCol, insertBeforeId);
  }
}

function performMove(card, newCol, insertBeforeId){
  const changedColumn = card.col !== newCol;
  const wasFinalStage = isFinalStage(card.col);
  card.col = newCol;
  if(changedColumn) card.estado = 'pendiente';

  if(isFinalStage(newCol) && !wasFinalStage){
    card.revisorPrevio = card.revisor || '';
    card.revisorFinal = REVISOR_FINAL;
  }

  state.cards = state.cards.filter(c => c.id !== card.id);
  if(insertBeforeId){
    const idx = state.cards.findIndex(c => c.id === insertBeforeId);
    if(idx !== -1) state.cards.splice(idx, 0, card);
    else state.cards.push(card);
  } else {
    const lastInCol = state.cards.reduce((acc, c, i) => c.col === newCol ? i : acc, -1);
    state.cards.splice(lastInCol + 1, 0, card);
  }

  render();
  scheduleSave();
}

/* ════════════════════════════
   DOCUMENTO (select en cascada según autor)
════════════════════════════ */
function populateDocSelectForAutor(autor, existingUrl){
  const sel = $('#f_doc');
  $('#docManualWrap').classList.add('hidden');
  $('#f_docManualUrl').value = '';

  if(!autor){
    sel.innerHTML = '<option value="">— Selecciona un autor primero —</option>';
    return;
  }

  const docs = state.docs.filter(d => d.autor === autor);
  sel.innerHTML = docs.length > 0
    ? '<option value="">— Selecciona un documento —</option>'
    : '<option value="">— Sin documentos registrados —</option>';
  docs.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.id;
    opt.textContent = d.nombre;
    sel.appendChild(opt);
  });
  const manualOpt = document.createElement('option');
  manualOpt.value = '__manual__';
  manualOpt.textContent = 'Otro (pegar link manualmente)';
  sel.appendChild(manualOpt);

  if(existingUrl){
    const match = docs.find(d => d.url === existingUrl);
    if(match){
      sel.value = match.id;
    } else {
      sel.value = '__manual__';
      $('#docManualWrap').classList.remove('hidden');
      $('#f_docManualUrl').value = existingUrl;
    }
  } else {
    sel.value = '';
  }
}

$('#f_autor').addEventListener('change', () => {
  populateDocSelectForAutor($('#f_autor').value, null);
});

$('#f_doc').addEventListener('change', () => {
  $('#docManualWrap').classList.toggle('hidden', $('#f_doc').value !== '__manual__');
});

/* ════════════════════════════
   MODAL TARJETA
════════════════════════════ */
const REVISOR_FINAL = 'Josué';
function isFinalStage(col){ return col === 'final' || col === 'listo'; }

function openCardModal(id, initialCol){
  editingCardId = id;
  const overlay = $('#cardOverlay');
  const form = $('#cardForm');
  form.reset();
  form.dataset.col = initialCol || 'preprod';

  fillResponsableSelect($('#f_autor'), '— Selecciona —', '');
  fillResponsableSelect($('#f_revisor'), '— Sin asignar —', '');
  fillResponsableSelect($('#f_revisorPrevio'), '— Sin asignar —', '');
  populateDocSelectForAutor('', null);

  let col = initialCol || 'preprod';

  if(id){
    const c = state.cards.find(x => x.id === id);
    if(!c) return;
    col = c.col;
    $('#modalTitle').textContent = 'Editar revisión';
    $('#f_title').value = c.title;
    $('#f_desc').value = c.desc || '';
    fillResponsableSelect($('#f_autor'), '— Selecciona —', c.autor);
    fillResponsableSelect($('#f_revisor'), '— Sin asignar —', c.revisor);
    fillResponsableSelect($('#f_revisorPrevio'), '— Sin asignar —', c.revisorPrevio || c.revisor || '');
    $('#f_estado').value = c.estado || 'pendiente';
    $('#cardDeleteBtn').style.display = 'inline-flex';
    populateDocSelectForAutor(c.autor, c.docUrl || null);
  } else {
    $('#modalTitle').textContent = 'Nueva revisión';
    $('#f_estado').value = 'pendiente';
    $('#cardDeleteBtn').style.display = 'none';
  }

  const final = isFinalStage(col);
  $('#revisorNormalWrap').classList.toggle('hidden', final);
  $('#revisorFinalWrap').classList.toggle('hidden', !final);
  $('#f_autor').disabled = final;
  $('#f_revisorPrevio').disabled = final;

  overlay.classList.add('open');
  setTimeout(() => $('#f_title').focus(), 60);
}

function closeCardModal(){
  $('#cardOverlay').classList.remove('open');
  editingCardId = null;
}

$('#cardCancelBtn').addEventListener('click', closeCardModal);
$('#cardOverlay').addEventListener('click', e => { if(e.target.id === 'cardOverlay') closeCardModal(); });

$('#cardForm').addEventListener('submit', e => {
  e.preventDefault();
  const autor = $('#f_autor').value;
  if(!autor){ toast('Selecciona quién crea esta revisión'); return; }

  const docSelectVal = $('#f_doc').value;
  let docNombre = '', docUrl = '';
  if(docSelectVal === '__manual__'){
    docUrl = $('#f_docManualUrl').value.trim();
    if(!docUrl){ toast('Pega el link del Google Doc'); return; }
    if(!isGoogleLink(docUrl)){ toast('Debe ser un link de Google Docs o Drive'); return; }
  } else if(docSelectVal){
    const doc = state.docs.find(d => d.id === docSelectVal);
    if(!doc){ toast('Ese documento ya no existe, elige otro'); return; }
    docNombre = doc.nombre;
    docUrl = doc.url;
  } else {
    toast('Selecciona o pega un documento de Google Doc');
    return;
  }

  const col = editingCardId ? (state.cards.find(x => x.id === editingCardId) || {}).col : (form.dataset.col || 'preprod');
  const final = isFinalStage(col);

  const data = {
    title: $('#f_title').value.trim(),
    desc: $('#f_desc').value.trim(),
    autor,
    estado: $('#f_estado').value,
    docNombre,
    docUrl,
  };

  if(final){
    data.revisorPrevio = $('#f_revisorPrevio').value;
    data.revisorFinal = REVISOR_FINAL;
  } else {
    data.revisor = $('#f_revisor').value;
  }

  if(editingCardId){
    const c = state.cards.find(x => x.id === editingCardId);
    Object.assign(c, data);
  } else {
    state.cards.push({ id: uid(), col: form.dataset.col || 'preprod', createdAt: new Date().toISOString(), ...data });
  }
  closeCardModal();
  render();
  scheduleSave();
});

const form = $('#cardForm');

$('#cardDeleteBtn').addEventListener('click', () => {
  if(!editingCardId) return;
  checkPassword().then(ok => {
    if(!ok) return;
    state.cards = state.cards.filter(c => c.id !== editingCardId);
    closeCardModal();
    render();
    scheduleSave();
    toast('Revisión eliminada');
  });
});

/* ════════════════════════════
   PASSWORD
════════════════════════════ */
function checkPassword(){
  return new Promise(resolve => {
    const overlay = $('#passOverlay'), input = $('#passInput'),
          confirmBtn = $('#passConfirmBtn'), cancelBtn = $('#passCancelBtn');
    input.value = '';
    overlay.classList.add('open');
    setTimeout(() => input.focus(), 60);
    function onConfirm(){
      const val = input.value;
      overlay.classList.remove('open');
      confirmBtn.removeEventListener('click', onConfirm);
      cancelBtn.removeEventListener('click', onCancel);
      input.removeEventListener('keydown', onKey);
      if(val === ADMIN_PASS) resolve(true);
      else { toast('Contraseña incorrecta'); resolve(false); }
    }
    function onCancel(){
      overlay.classList.remove('open');
      confirmBtn.removeEventListener('click', onConfirm);
      cancelBtn.removeEventListener('click', onCancel);
      input.removeEventListener('keydown', onKey);
      resolve(false);
    }
    function onKey(e){ if(e.key === 'Enter') onConfirm(); if(e.key === 'Escape') onCancel(); }
    confirmBtn.addEventListener('click', onConfirm);
    cancelBtn.addEventListener('click', onCancel);
    input.addEventListener('keydown', onKey);
  });
}

/* ════════════════════════════
   SETUP / AUTH
════════════════════════════ */
$('#connectBtn').addEventListener('click', async () => {
  const val = $('#tokenInput').value.trim();
  if(!val){ toast('Pega un token válido'); return; }
  token = val;
  localStorage.setItem(STORAGE_TOKEN_KEY, token);
  try{ await boot(); }
  catch(e){ toast('Token inválido o sin permisos de gist'); console.error(e); token = ''; localStorage.removeItem(STORAGE_TOKEN_KEY); }
});

$('#logoutBtn').addEventListener('click', () => {
  if(!confirm('Esto borrará el token guardado en este navegador. ¿Continuar?')) return;
  localStorage.removeItem(STORAGE_TOKEN_KEY);
  localStorage.removeItem(STORAGE_GIST_KEY);
  location.reload();
});

$('#refreshBtn').addEventListener('click', () => { toast('Actualizando...'); loadAll(); });

/* ════════════════════════════
   REPORTE WHATSAPP
════════════════════════════ */
const COL_LABELS_REP = { preprod:'Pre-producción', edicion:'Edición', final:'Revisión final', listo:'Listo' };
const COL_EMOJI_REP  = { preprod:'🔵', edicion:'🟡', final:'🟣', listo:'🟢' };

$('#reportBtn').addEventListener('click', () => $('#reportOverlay').classList.add('open'));
$('#reportCancelBtn').addEventListener('click', () => $('#reportOverlay').classList.remove('open'));
$('#reportOverlay').addEventListener('click', e => { if(e.target.id === 'reportOverlay') $('#reportOverlay').classList.remove('open'); });

$('#reportGenerateBtn').addEventListener('click', () => {
  const cols = [];
  if($('#rep_preprod').checked) cols.push('preprod');
  if($('#rep_edicion').checked) cols.push('edicion');
  if($('#rep_final').checked) cols.push('final');
  if($('#rep_listo').checked) cols.push('listo');
  if(cols.length === 0){ toast('Elige al menos una fase'); return; }

  let list = state.cards.filter(c => cols.includes(c.col));
  if($('#rep_onlyPending').checked) list = list.filter(needsAttention);
  if(list.length === 0){ toast('No hay cards que cumplan con esos filtros'); return; }

  $('#reportOverlay').classList.remove('open');
  generateReport(list, cols);
});

function generateReport(list, cols){
  const today = new Date();
  const fechaLegible = today.toLocaleDateString('es-MX', { day:'numeric', month:'long', year:'numeric' });
  const colsLabel = cols.map(c => COL_LABELS_REP[c]).join(', ');
  const line1 = '\u2501'.repeat(15);
  const line2 = '\u2504'.repeat(15);

  const groups = {};
  cols.forEach(c => { groups[c] = list.filter(x => x.col === c); });

  let text = `🎬 *REPORTE DE REVISIONES*\n`;
  text += `📅 ${fechaLegible}\n`;
  text += `📂 _Incluye: ${colsLabel}_\n`;
  text += `${line1}\n\n`;

  cols.forEach(col => {
    const items = groups[col];
    if(items.length === 0) return;
    text += `${COL_EMOJI_REP[col]} *${COL_LABELS_REP[col].toUpperCase()}*\n\n`;
    items.forEach(c => {
      const est = ESTADOS[c.estado] || ESTADOS.pendiente;
      text += `📌 *${c.title}*\n`;
      text += `${est.label}\n`;
      if(c.autor)   text += `👤 *Autor:* ${c.autor}\n`;
      if(c.revisor) text += `🔍 *Revisor:* ${c.revisor}\n`;
      text += `📄 *Doc:* ${c.docNombre || 'Ver link'}\n`;
      text += `${line2}\n\n`;
    });
  });

  text += `📊 *Total de cards:* ${list.length}`;

  const encoded = encodeURIComponent(text);
  const url = `https://wa.me/?text=${encoded}`;
  window.open(url, '_blank');
}

/* ════════════════════════════
   ADMIN: DOCUMENTOS POR AUTOR
════════════════════════════ */
$('#adminDocsBtn').addEventListener('click', () => {
  checkPassword().then(ok => { if(ok) openAdminOverlay(); });
});

function openAdminOverlay(){
  fillResponsableSelect($('#admin_autor'), '— Autor —', '');
  $('#admin_nombre').value = '';
  $('#admin_url').value = '';
  renderAdminDocsList();
  $('#adminOverlay').classList.add('open');
}

$('#adminCloseBtn').addEventListener('click', () => $('#adminOverlay').classList.remove('open'));
$('#adminOverlay').addEventListener('click', e => { if(e.target.id === 'adminOverlay') $('#adminOverlay').classList.remove('open'); });

function renderAdminDocsList(){
  const wrap = $('#adminDocsList');
  if(state.docs.length === 0){
    wrap.innerHTML = '<div class="no-docs-admin">Aún no hay documentos registrados.</div>';
    return;
  }
  // Agrupar por autor para que sea fácil de leer
  const porAutor = {};
  state.docs.forEach(d => { (porAutor[d.autor] = porAutor[d.autor] || []).push(d); });

  wrap.innerHTML = Object.keys(porAutor).sort().map(autor => porAutor[autor].map(d => `
    <div class="admin-doc-row" data-id="${d.id}">
      <div class="admin-doc-info">
        <span class="admin-doc-autor">${escapeHtml(autor)}</span>
        <p class="admin-doc-nombre">${escapeHtml(d.nombre)}</p>
        <a class="admin-doc-url" href="${escapeHtml(d.url)}" target="_blank" rel="noopener">${escapeHtml(d.url)}</a>
      </div>
      <button type="button" class="admin-doc-remove" data-id="${d.id}" title="Eliminar">×</button>
    </div>
  `).join('')).join('');

  wrap.querySelectorAll('.admin-doc-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      if(!confirm('¿Eliminar este documento de la lista? Las cards que ya lo usan conservan su link.')) return;
      state.docs = state.docs.filter(d => d.id !== btn.dataset.id);
      renderAdminDocsList();
      scheduleSave();
      toast('Documento eliminado');
    });
  });
}

$('#adminAddDocBtn').addEventListener('click', () => {
  const autor = $('#admin_autor').value;
  const nombre = $('#admin_nombre').value.trim();
  const url = $('#admin_url').value.trim();

  if(!autor){ toast('Selecciona un autor'); return; }
  if(!nombre){ toast('Ponle un nombre a este documento'); return; }
  if(!url){ toast('Pega el link del Google Doc'); return; }
  if(!isGoogleLink(url)){ toast('Debe ser un link de Google Docs o Drive'); return; }

  state.docs.push({ id: uid(), autor, nombre, url });
  $('#admin_nombre').value = '';
  $('#admin_url').value = '';
  renderAdminDocsList();
  scheduleSave();
  toast('Documento agregado');
});

async function boot(){
  $('#setupScreen').classList.add('hidden');
  $('#appScreen').classList.remove('hidden');
  await loadAll();
}

(async function init(){
  if(token){
    try{ await boot(); }
    catch(e){
      console.error(e);
      $('#appScreen').classList.add('hidden');
      $('#setupScreen').classList.remove('hidden');
      toast('No se pudo conectar. Revisa el token.');
    }
  } else {
    $('#setupScreen').classList.remove('hidden');
  }
})();
</script>
